services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  model_service:
    build: 
      context: ./model_service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    volumes:
      - ./model_service:/app

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - PORT=${BACKEND_PORT:-8000}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-agri_market_intel}
      - MODEL_SERVICE_URL=${MODEL_SERVICE_URL:-http://model_service:8001}
      - MAX_MARKETS_PER_SCOPE=${MAX_MARKETS_PER_SCOPE:-100}
    depends_on:
      - mongo
      - model_service
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
